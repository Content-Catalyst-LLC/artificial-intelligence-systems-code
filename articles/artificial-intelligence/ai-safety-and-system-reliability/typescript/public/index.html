<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Safety Reliability Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 2rem;
      line-height: 1.5;
      color: #111;
      background: #f8f5ef;
    }

    .safety-dashboard {
      background: #fff;
      border: 1px solid #e5ded0;
      padding: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }

    .summary-grid div {
      border: 1px solid #e5ded0;
      padding: 1rem;
      background: #f8f5ef;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    th,
    td {
      border: 1px solid #e5ded0;
      padding: 0.75rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">Build the TypeScript dashboard with npm run build, then load the compiled JavaScript.</div>
  <script type="module" src="../dist/safety_dashboard.js"></script>
</body>
</html>
