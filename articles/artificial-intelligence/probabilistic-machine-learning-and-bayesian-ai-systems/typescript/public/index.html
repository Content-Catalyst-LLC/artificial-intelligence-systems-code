<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Probabilistic Machine Learning Governance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 2rem;
      line-height: 1.5;
      background: #f8f5ef;
      color: #111;
    }

    .probabilistic-dashboard {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5ded0;
      padding: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th,
    td {
      border: 1px solid #e5ded0;
      padding: 0.75rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #111;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">Build the TypeScript dashboard with npm run build.</div>
  <script type="module" src="../dist/probabilistic_dashboard.js"></script>
</body>
</html>
